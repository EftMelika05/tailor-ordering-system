{% load static %}
<!doctype html>
<html lang="fa" dir="ltr">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>confirm new password</title>

    <link rel="shortcut icon" href="{% static 'imag/Dozino_Logo_Transparent.png' %}" type="image/x-icon">
    <link rel="stylesheet" href="{% static 'fonts/web/font-face.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        @font-face {
            font-family: 'Gandom';
            src: url('font/gandom-font-v0.5.1/Gandom.eot');
            src: url('font/gandom-font-v0.5.1/Gandom.eot?#iefix') format('embedded-opentype'),
                url('font/gandom-font-v0.5.1/Gandom.woff') format('woff'),
                url('font/gandom-font-v0.5.1/gandom.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        html,
        body {
            height: 100%;
            margin: 0;
        }

        body {
            font-family: Gandom, Calibri, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            font-size: 18px;
            background: #f2f2f8;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0;
        }


        /* Top Bar */
        .topbar {
            width: 100%;
            height: 90px;
            background: #000000;
            display: flex;
            align-items: center;
            padding: 0 35px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            direction: rtl;
            text-align: right;
            border-radius: 0 0 10px 10px;
        }

        .home-link {
            width: 44px;
            height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.35);
            border: 1px solid rgba(0, 0, 0, 0.06);
            transition: background-color 0.2s ease, transform 0.2s ease;
        }

        .home-link:hover {
            background: rgba(255, 255, 255, 0.55);
            transform: translateY(-1px);
        }

        .home-icon {
            width: 24px;
            height: 24px;
            fill: #c9a86a;
        }


        .logo {
            font-family: Tahoma, sans-serif !important;
            font-size: 34px;
            color: #c9a86a;
            line-height: 1;
            margin-left: 0;
            margin-right: auto;
            direction: ltr;
        }

        .page-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px 20px;
            width: 100%;
        }

        .auth-card {
            display: grid;
            grid-template-columns: 1fr 1fr;
            width: min(1000px, 100%);
            min-height: 520px;
            background: #fff;
            border-radius: 22px;
            overflow: hidden;
            box-shadow: -2px 0 10px rgba(45, 48, 0, 0.4);
            align-items: stretch;
        }

        .left {
            padding: 56px;
            background: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-bottom: 40px;
            justify-content: flex-start;
        }

        .logo-mark {
            width: 42px;
            border-radius: 50%;
            position: relative;
        }

        .brand-name {
            font-weight: 700;
            font-size: 24px;
            color: #2b2b3c;
        }

        h2 {
            text-align: end;
            margin: 0 0 12px;
            font-size: 32px;
            color: #000;
        }

        p {
            text-align: end;
            margin-bottom: 35px;
            color: #5b5b6a;
            font-size: 18px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .field {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f7f6fb;
            border: 1px solid rgba(0, 0, 0, .06);
            border-radius: 16px;
            padding: 12px;
        }

        .field input {
            width: 100%;
            border: none;
            background: transparent;
            outline: none;
            font-size: 14px;
            color: #2b2b3c;
        }

        .field-icon {
            width: 26px;
            text-align: center;
            opacity: .7;
        }

        .field .eye-btn {
            background: none;
            border: none;
            color: #a0988a;
            font-size: 18px;
            cursor: pointer;
            padding: 0 4px;
            transition: 0.3s;
        }

        .field .eye-btn:hover {
            color: #c9a86a;
        }

        .btn {
            margin-top: 10px;
            background: linear-gradient(90deg, #c9a86a 0%, #22231f 100%);
            color: #fff;
            border: none;
            border-radius: 999px;
            padding: 13px 16px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 15px;
        }

        .btn:hover {
            filter: brightness(1.05);
            transform: translateY(-5px);
            box-shadow: 0 10px 22px rgba(102, 97, 0, 0.22);
        }

        .right {
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #f5f5f5;
            min-height: 100%;
        }

        .right img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
            object-position: center;
        }

        .login-row {
            margin-top: 22px;
            text-align: end;
            font-size: 14px;
            color: #5b5b6a;
        }

        .login-row a {
            color: #c9a86a;
            font-weight: 700;
            text-decoration: none;
        }

        .login-row a:hover {
            text-decoration: underline;
        }

        .alert-box {
            display: none;
            text-align: end;
            font-size: 13px;
            color: #1f8a4c;
            background: #eaf7ef;
            border: 1px solid #cdeedc;
            border-radius: 10px;
            padding: 8px 12px;
        }

        .alert-box.show {
            display: block;
        }

        .alert-box.error {
            color: #a94442;
            background: #f2dede;
            border-color: #ebcccc;
        }

        @media(max-width: 800px) {
            .auth-card {
                grid-template-columns: 1fr;
                min-height: auto;
            }

            .right {
                min-height: 200px;
                display: none;
            }

            .left {
                padding: 30px 20px;
            }
        }
    </style>
</head>

<body>

    <header class="topbar">

        <a class="home-link" href="{% url 'index' %}" aria-label="صفحه اصلی" title="صفحه اصلی">
            <!-- SVG Home Icon -->
            <svg class="home-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path
                    d="M12 3.2 3 10.4v10.4c0 .6.4 1 1 1h5.5v-7.2c0-.6.4-1 1-1h3c.6 0 1 .4 1 1V22H20c.6 0 1-.4 1-1V10.4l-9-7.2z" />
            </svg>
        </a>
        <div class="logo">Dozino</div>
    </header>

    <div class="page-wrapper">
        <div class="auth-card">
            <div class="left">
                <header class="brand">
                    <img src="{% static 'imag/logo.png' %}" alt="logo" class="logo-mark">
                    <div class="brand-name">Dozino</div>
                </header>
                <h2>رمز عبور جدید</h2>
                <p>یک رمز عبور جدید برای حساب کاربری خود انتخاب کنید</p>

                <form id="resetPasswordForm" novalidate method="POST">
                    {% csrf_token %}
                    <div class="field">
                        <label class="field-icon" aria-hidden="true"><i class="fas fa-lock"></i></label>
                        <input type="password" id="passwordInput" name="password" placeholder="new password" required />
                        <button type="button" class="eye-btn" onclick="togglePassword('passwordInput', this)">
                            <i class="fa-regular fa-eye"></i>
                        </button>
                    </div>

                    <div class="field">
                        <label class="field-icon" aria-hidden="true"><i class="fas fa-lock"></i></label>
                        <input type="password" id="confirmPasswordInput" name="password2"
                            placeholder="confirm new password" required />
                        <button type="button" class="eye-btn" onclick="togglePassword('confirmPasswordInput', this)">
                            <i class="fa-regular fa-eye"></i>
                        </button>
                    </div>

                    <div class="alert-box" id="errorBox">رمز عبور و تکرار آن یکسان نیستند</div>
                    <div class="alert-box" id="successBox">رمز عبور با موفقیت تغییر یافت</div>

                    <button type="submit" class="btn">تغییر رمز عبور</button>
                </form>

                <div class="login-row">
                    رمز خود را به خاطر آوردید؟ <a href="{% url 'login' %}">ورود به حساب کاربری</a>
                </div>
            </div>
            <div class="right">
                <img src="{% static 'imag/home/L-R.png' %}" alt="image" />
            </div>
        </div>
    </div>

    <script>
        // ===== TOGGLE PASSWORD VISIBILITY =====
        function togglePassword(inputId, buttonElement) {
            const passwordInput = document.getElementById(inputId);
            const eyeIcon = buttonElement.querySelector('i');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.className = 'fa-regular fa-eye-slash';
            } else {
                passwordInput.type = 'password';
                eyeIcon.className = 'fa-regular fa-eye';
            }
        }

        // ===== FORM SUBMIT =====
        document.getElementById('resetPasswordForm').addEventListener('submit', function (e) {
            //e.preventDefault();

            const password = document.getElementById('passwordInput');
            const confirmPassword = document.getElementById('confirmPasswordInput');
            const errorBox = document.getElementById('errorBox');
            const successBox = document.getElementById('successBox');

            // مخفی کردن پیام‌های قبلی
            errorBox.classList.remove('show', 'error');
            successBox.classList.remove('show');

            // اعتبارسنجی
            if (password.value.length < 6) {
                errorBox.textContent = 'رمز عبور باید حداقل ۶ کاراکتر باشد';
                errorBox.classList.add('show', 'error');
                password.focus();
                return;
            }

            if (password.value !== confirmPassword.value) {
                errorBox.textContent = 'رمز عبور و تکرار آن یکسان نیستند';
                errorBox.classList.add('show', 'error');
                confirmPassword.focus();
                return;
            }

            // موفقیت
            successBox.textContent = 'رمز عبور با موفقیت تغییر یافت';
            successBox.classList.add('show');

            // پاک کردن فیلدها
            password.value = '';
            confirmPassword.value = '';

            // شبیه‌سازی رفتن به صفحه ورود بعد از ۲ ثانیه
            setTimeout(function () {
                // window.location.href = 'login.html';
            }, 2000);
        });

        // پاک کردن خطا هنگام تایپ
        document.getElementById('passwordInput').addEventListener('input', function () {
            document.getElementById('errorBox').classList.remove('show', 'error');
        });

        document.getElementById('confirmPasswordInput').addEventListener('input', function () {
            document.getElementById('errorBox').classList.remove('show', 'error');
        });
    </script>

</body>

</html>
