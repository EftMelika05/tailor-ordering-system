{% load static %}
<!doctype html>
<html lang="fa" dir="ltr">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>sign up</title>

    <link rel="shortcut icon" href="{% static 'imag/Dozino_Logo_Transparent.png' %}" type="image/x-icon">
    <link rel="stylesheet" href="{% static 'font/font-face.css' %}">
    <link rel="stylesheet"href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">


    <style>
        * {
            box-sizing: border-box;
            margin: 0;
        }

        @font-face {
            font-family: 'Gandom';
            src: url('font/gandom-font-v0.5.1/Gandom.eot');
            src: url('font/gandom-font-v0.5.1/Gandom.eot?#iefix') format('embedded-opentype'),
                url('font/gandom-font-v0.5.1/Gandom.woff') format('woff'),
                url('font/gandom-font-v0.5.1/gandom.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        html,
        body {
            height: 100%;
        }

        body {
            font-family: Gandom, Calibri, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            font-size: 18px;
            background: #f2f2f8;
            color: #5b5b6a;
        }


        /* Top Bar */
        .topbar {
            height: 90px;
            background: #000000;
            display: flex;
            align-items: center;
            padding: 0 35px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            direction: rtl;
            text-align: right;
            border-radius: 0 0 10px 10px;
        }

        .home-link {
            width: 44px;
            height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.35);
            border: 1px solid rgba(0, 0, 0, 0.06);
            transition: background-color 0.2s ease, transform 0.2s ease;
        }

        .home-link:hover {
            background: rgba(255, 255, 255, 0.55);
            transform: translateY(-1px);
        }

        .home-icon {
            width: 24px;
            height: 24px;
            fill: #c9a86a;
        }


        .logo {
            font-family: Tahoma, sans-serif !important;
            /* font-family: "Playfair Display", serif; */
            /* font-style: italic; */
            font-size: 34px;
            color: #c9a86a;
            line-height: 1;
            margin-left: 0;
            margin-right: auto;
            direction: ltr;
        }

        .page {
            min-height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 28px 16px;
        }

        .auth-card {
            width: min(1120px, 100%);
            background: #ffffff;
            border-radius: 22px;
            overflow: hidden;
            display: grid;
            grid-template-columns: 1fr 1fr;
            box-shadow: -2px 0 10px rgba(45, 48, 0, 0.4);

        }

        .left {
            padding: 56px 56px;
            background: #fff;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            justify-content: flex-start;
        }

        .logo-mark {
            width: 42px;
            border-radius: 50%;
            position: relative;
        }

        .brand-name {
            font-weight: 700;
            font-size: 24px;
            color: #2b2b3c;
        }

        .title {
            margin: 0 0 20px;
            font-size: 32px;
            letter-spacing: -.4px;
            color: #2b2b3c;
            text-align: center;
        }

        .subtitle {
            margin: 0 0 28px;
            color: #8a8a9b;
            font-size: 17px;
            text-align: center;
        }

        .form {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .field {
            position: relative;
            background: #f7f6fb;
            border: 1px solid rgba(0, 0, 0, .06);
            border-radius: 16px;
            padding: 12px 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .field input {
            width: 100%;
            border: none;
            outline: none;
            background: transparent;
            font-size: 14px;
            color: #2b2b3c;
            padding-inline: 2px;
        }

        .field input::placeholder {
            color: #9a9ab0;
        }

        .field-icon {
            width: 26px;
            text-align: center;
            opacity: .7;
        }

        .eye {
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 16px;
            opacity: .7;
        }

        /* Button */
        .btn {
            margin-top: 8px;
            background: linear-gradient(90deg, #c9a86a 0%, #22231f 100%);
            color: #fff;
            border: none;
            border-radius: 50px;
            padding: 13px 16px;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            transition: .2s;
        }

        .btn:hover {
            filter: brightness(1.05);
            transform: translateY(-5px);
            box-shadow: 0 10px 22px rgba(102, 97, 0, 0.22);
        }

        /* Login */
        .login-link {
            margin: 8px 0 0;
            font-size: 18px;
            color: #8a8a9b;
            text-align: center;
        }

        .login-link a {
            color: #c9a86a;
            text-decoration: none;
            font-weight: 700;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .right {
            position: relative;
            min-height: 520px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f5f5f5;
        }

        .right img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
            object-position: center;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .auth-card {
                grid-template-columns: 1fr;
            }

            .right {
                min-height: 320px;
                display: none;
            }

            .left {
                padding: 36px 18px;
            }
        }
    </style>

</head>

<body>
    <header class="topbar">

        <a class="home-link" href="{% url 'index' %}" aria-label="صفحه اصلی" title="صفحه اصلی">
            <!-- SVG Home Icon -->
            <svg class="home-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path
                    d="M12 3.2 3 10.4v10.4c0 .6.4 1 1 1h5.5v-7.2c0-.6.4-1 1-1h3c.6 0 1 .4 1 1V22H20c.6 0 1-.4 1-1V10.4l-9-7.2z" />
            </svg>
        </a>
        <div class="logo">Dozino</div>
    </header>


    <main class="page">
        <section class="auth-card" aria-label="register form">
            <!-- Left content -->
            <div class="left">
                <header class="brand">
                    <img src="{% static 'imag/logo.png' %}" alt="logo" class="logo-mark">
                    <div class="brand-name">Dozino</div>
                </header>

                <h1 class="title">به دوزینو خوش اومدید</h1>
                <p class="subtitle">در یک دقیقه اکانت خود را بسازید</p>
                {% include 'includes/messages.html' %}
                <form class="form" method="POST" >
                        {% csrf_token %}
                    <div class="field">
                        <label class="field-icon" aria-hidden="true"><i class="fas fa-user"></i></label>
                        <input type="text" name="username" placeholder="Username" required />
                    </div>

                    <div class="field">
                        <label class="field-icon" aria-hidden="true"><i class="fas fa-mobile-alt"></i></label>
                        <input type="tel" name="phone_number" placeholder="phone number" required autocomplete="tel"
                            inputmode="tel" />
                    </div>

                    <div class="field">
                        <label class="field-icon" aria-hidden="true"><i class="fas fa-lock"></i></label>
                        <input type="password" name="password" placeholder="Password" required />
                        <button type="button" class="eye" aria-label="نمایش رمز عبور" data-target="password">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>

                    <div class="field">
                        <label class="field-icon" aria-hidden="true"><i class="fas fa-lock"></i></label>
                        <input type="password" name="password2" placeholder="Confirm Password" required />
                        <button type="button" class="eye" aria-label="نمایش رمز عبور" data-target="Password2">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>

                    <button class="btn" type="submit">ثبت نام</button>

                    <p class="login-link">
                        قبلا ثبت نام کرده اید؟<a href="{% url 'login' %}"> وارد شوید</a>
                    </p>
                </form>
            </div>

            <div class="right">
                <img src="{% static 'imag/home/L-R.png' %}" alt="" class="image">
            </div>

        </section>
    </main>
    <br>

    <script>
        // toggle password visibility
        document.querySelectorAll('.eye').forEach(function (btn) {
            btn.addEventListener('click', function () {
                const targetName = btn.getAttribute('data-target');
                const input = document.querySelector('input[name="' + targetName + '"]');
                const icon = btn.querySelector('i');
                if (!input) return;

                if (input.type === 'password') {
                    input.type = 'text';
                    icon.classList.remove('fa-eye');
                    icon.classList.add('fa-eye-slash');
                } else {
                    input.type = 'password';
                    icon.classList.remove('fa-eye-slash');
                    icon.classList.add('fa-eye');
                }
            });
        });

        // confirm password validation
        document.querySelector('.form').addEventListener('submit', function (e) {
            const password = document.querySelector('input[name="password"]');
            const confirmPassword = document.querySelector('input[name="password2"]');

            if (password.value !== confirmPassword.value) {
                e.preventDefault();
                confirmPassword.setCustomValidity('رمز عبور و تکرار آن یکسان نیستند');
                confirmPassword.reportValidity();
            } else {
                confirmPassword.setCustomValidity('');
            }
        });

        document.querySelector('input[name="password2"]').addEventListener('input', function () {
            this.setCustomValidity('');
        });
 
    </script>

</body>

</html>
