{% load static %}
<!doctype html>
<html lang="fa" dir="ltr">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dozino | login</title>

    <link rel="shortcut icon" href="{% static 'imag/Dozino_Logo_Transparent.png' %}" type="image/x-icon">
    <link rel="stylesheet" href="{% static 'fonts/web/font-face.css' %}">
    <link rel="stylesheet" href="{$ static 'assets/FontAwesome.Pro.7.2.0/css/all.css' %}">

    <style>
        * {
            box-sizing: border-box;
        }

        @font-face {
            font-family: 'Gandom';
            src: url('assets/font/gandom-font-v0.5.1/Gandom.eot');
            src: url('assets/font/gandom-font-v0.5.1/Gandom.eot?#iefix') format('embedded-opentype'),
                url('assets/font/gandom-font-v0.5.1/Gandom.woff') format('woff'),
                url('assets/font/gandom-font-v0.5.1/gandom.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }


        html,
        body {
            height: 100%;
            margin: 0;
        }

        body {
            font-family: Gandom, Calibri, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            background: #f2f2f8;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0;

        }


        /* Top Bar */
        .topbar {
            width: 100%;
            height: 90px;
            background: #000000;
            display: flex;
            align-items: center;
            padding: 0 35px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            direction: rtl;
            text-align: right;
            border-radius: 0 0 10px 10px;
        }

        .home-link {
            width: 44px;
            height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.35);
            border: 1px solid rgba(0, 0, 0, 0.06);
            transition: background-color 0.2s ease, transform 0.2s ease;
        }

        .home-link:hover {
            background: rgba(255, 255, 255, 0.55);
            transform: translateY(-1px);
        }

        .home-icon {
            width: 24px;
            height: 24px;
            fill: #c9a86a;
        }


        .logo {
            font-family: Tahoma, sans-serif !important;
            font-size: 34px;
            color: #c9a86a;
            line-height: 1;
            margin-left: 0;
            margin-right: auto;
            direction: ltr;
        }



        .auth-card {
            display: grid;
            grid-template-columns: 1fr 1fr;
            width: min(1120px, 100%);
            height: 90%;
            background: #ffffff;
            border-radius: 22px;
            overflow: hidden;
            box-shadow: -2px 0 10px rgba(45, 48, 0, 0.4);
        }

        .left {
            padding: 56px;
            background: #fff;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-bottom: 50px;
            justify-content: flex-start;
        }

        .logo-mark {
            width: 42px;
            border-radius: 50%;
            position: relative;
        }

        .brand-name {
            font-weight: 700;
            font-size: 24px;
            color: #2b2b3c;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .field {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f7f6fb;
            border: 1px solid rgba(0, 0, 0, .06);
            border-radius: 16px;
            padding: 12px;
        }

        .field input {
            width: 100%;
            border: none;
            background: transparent;
            outline: none;
            font-size: 14px;
            color: #2b2b3c;
        }

        .field-icon {
            width: 26px;
            text-align: center;
            opacity: .7;
        }

        .eye {
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 16px;
            opacity: .7;
        }

        .btn {
            margin-top: 10px;
            background: linear-gradient(90deg, #c9a86a 0%, #22231f 100%);
            color: #fff;
            border: none;
            border-radius: 50px;
            padding: 13px 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 18px;
        }

        .btn:hover {
            filter: brightness(1.05);
            transform: translateY(-5px);
            box-shadow: 0 10px 22px rgba(102, 97, 0, 0.22);
        }

        .link {
            margin: 8px 0 0;
            font-size: 16px;
            color: #8a8a9b;
            text-align: center;
        }

        .link a {
            color: #c9a86a;
            text-decoration: none;
            font-weight: 700;
        }

        .link a:hover {
            text-decoration: underline;
        }


        .right {
            position: relative;
            min-height: 520px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f5f5f5;
        }

        .right img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
            object-position: center;
        }

        /* ریسپانسیو */
        @media(max-width: 800px) {
            .auth-card {
                grid-template-columns: 1fr;
            }

            .right {
                display: none;
            }
        }
    </style>
</head>

<body>

    <header class="topbar">

        <a class="home-link" href="" aria-label="صفحه اصلی" title="صفحه اصلی">
            <!-- SVG Home Icon -->
            <svg class="home-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path
                    d="M12 3.2 3 10.4v10.4c0 .6.4 1 1 1h5.5v-7.2c0-.6.4-1 1-1h3c.6 0 1 .4 1 1V22H20c.6 0 1-.4 1-1V10.4l-9-7.2z" />
            </svg>
        </a>
        <div class="logo">Dozino</div>
    </header>
    <br>
    <div class="auth-card">
        <div class="left">
            <header class="brand">
                <img src="{% static 'imag/logo.png' %}"  alt="logo" class="logo-mark">
                <div class="brand-name">Dozino</div>
            </header>

                {% if messages %}
                    {% for message in messages %}
                        <p>{{ message }}</p>
                    {% endfor %}
                {% endif %}
                            
            <form id="loginForm" method="POST">
                     {% csrf_token %}
                <div class="field">
                    <label class="field-icon" aria-hidden="true"><i class="fas fa-mobile-alt"></i></label>
                    <input type="tel" id="phoneInput" name="username" placeholder="username" required />
                </div>
                <div class="field">
                    <label class="field-icon" aria-hidden="true">🔒</label>
                    <input type="password"  name="password" placeholder="Password" required />
                </div>
                <button type="submit" class="btn">ورود</button>

                <p class="link">
                    هنوز اکانت نداری؟ <a href="{% url 'register' %}">ثبت نام کن</a>
                </p>
                <p class="link">
                    پسوردت رو فراموش کردی؟ <a href="{% url 'resetpassword' %}">با شمارت وارد شو</a>
                </p>

            </form >
        </div>
        <div class="right">
            <img src="{% static 'imag/home/L-R.png' %}" alt="image" />
        </div>
    </div>

    <br>
</body>

</html>
