{% load static %}
<!doctype html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dozino | ورود به پنل خیاط</title>

    <link rel="shortcut icon" href="{% static 'imag/Dozino_Logo_Transparent.png' %}" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @font-face {
            font-family: 'Gandom';
            src: url('{% static 'font/gandom-font-v0.5.1/Gandom.eot' %}');
            src: url('{% static 'font/gandom-font-v0.5.1/Gandom.eot?#iefix' %}') format('embedded-opentype'),
                url('{% static 'font/gandom-font-v0.5.1/Gandom.woff' %}') format('woff'),
                url('{% static 'font/gandom-font-v0.5.1/gandom.ttf' %}') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        html,
        body {
            height: 100%;
            margin: 0;
            font-family: 'Gandom', 'Vazirmatn', Tahoma, sans-serif;
            background: #f2f2f8;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            direction: rtl;
        }

        /* ===== AUTH CARD ===== */
        .auth-card {
            display: grid;
            grid-template-columns: 1fr 1fr;
            max-width: 1120px;
            width: 100%;
            min-height: 550px;
            background: #ffffff;
            border-radius: 22px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
        }

        /* ===== RIGHT: IMAGE ===== */
        .right {
            position: relative;
            min-height: 400px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f5f5f5;
        }

        .right img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
            object-position: center;
        }

        /* ===== LEFT: FORM ===== */
        .left {
            padding: 56px 50px;
            background: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .left h1 {
            font-size: 28px;
            color: #1e1e1e;
            margin-bottom: 8px;
            text-align: center;
        }

        .left h1 i {
            color: #c9a86a;
            margin-left: 10px;
        }

        .left .subtitle {
            color: #888;
            font-size: 14px;
            text-align: center;
            margin-bottom: 30px;
        }

        .left .subtitle i {
            color: #c9a86a;
            margin-left: 6px;
        }

        /* ===== FORM ===== */
        form {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .field {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #f7f6fb;
            border: 1px solid rgba(0, 0, 0, .06);
            border-radius: 16px;
            padding: 14px 16px;
            transition: border-color 0.3s;
        }

        .field:focus-within {
            border-color: #c9a86a;
            box-shadow: 0 0 0 3px rgba(201, 168, 106, 0.15);
        }

        .field input {
            width: 100%;
            border: none;
            background: transparent;
            outline: none;
            font-size: 15px;
            color: #2b2b3c;
            font-family: 'Gandom', 'Vazirmatn', Tahoma, sans-serif;
        }

        .field input::placeholder {
            color: #aaa;
        }

        .field-icon {
            width: 24px;
            text-align: center;
            color: #888;
            font-size: 18px;
        }

        .eye {
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 18px;
            color: #888;
        }

        .eye:hover {
            color: #c9a86a;
        }

        .btn {
            margin-top: 10px;
            background: linear-gradient(135deg, #c9a86a, #b38f55);
            color: #fff;
            border: none;
            border-radius: 50px;
            padding: 14px 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 18px;
            font-family: 'Gandom', 'Vazirmatn', Tahoma, sans-serif;
            width: 100%;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(201, 168, 106, 0.35);
        }

        .btn i {
            margin-left: 8px;
        }

        .link {
            margin: 15px 0 0;
            font-size: 14px;
            color: #8a8a9b;
            text-align: center;
        }

        .link a {
            color: #c9a86a;
            text-decoration: none;
            font-weight: 600;
        }

        .link a:hover {
            text-decoration: underline;
        }

        /* ===== MESSAGES ===== */
        .messages {
            margin-bottom: 15px;
        }

        .message {
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .message-error {
            background: #fde8e8;
            color: #a94442;
            border: 1px solid #f5c6cb;
        }

        .message-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        /* ===== RESPONSIVE ===== */
        @media(max-width: 800px) {
            .auth-card {
                grid-template-columns: 1fr;
                min-height: auto;
            }

            .right {
                display: none;
            }

            .left {
                padding: 30px 25px;
            }

            .left h1 {
                font-size: 22px;
            }
        }

        @media(max-width: 480px) {
            .left {
                padding: 20px 16px;
            }

            .field {
                padding: 10px 12px;
            }

            .btn {
                font-size: 16px;
                padding: 12px;
            }
        }
    </style>
</head>

<body>

    <div class="auth-card">
        <!-- ===== سمت راست: عکس ===== -->
        <div class="right">
            <img src="{% static 'imag/home/L-R.png' %}" alt="تصویر" />
        </div>

        <!-- ===== سمت چپ: فرم ===== -->
        <div class="left">
            <h1><i class="fa-solid fa-scissors"></i>ورود به پنل خیاط</h1>
            <p class="subtitle">
                <i class="fa-solid fa-shield-alt"></i>
                فقط پرسنل مجاز دسترسی دارند
            </p>

            {% if messages %}
            <div class="messages">
                {% for message in messages %}
                <div class="message message-{{ message.tags }}">
                    <i class="fa-solid fa-{% if message.tags == 'error' %}times-circle{% else %}check-circle{% endif %}"></i>
                    {{ message }}
                </div>
                {% endfor %}
            </div>
            {% endif %}

            <form method="POST">
                {% csrf_token %}

                <div class="field">
                    <span class="field-icon"><i class="fa-regular fa-user"></i></span>
                    <input type="text" name="username" placeholder="نام کاربری" required autofocus>
                </div>

                <div class="field">
                    <span class="field-icon"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" id="passwordInput" name="password" placeholder="رمز عبور" required>
                    <button type="button" class="eye" onclick="togglePassword()" aria-label="نمایش رمز عبور">
                        <i class="fa-regular fa-eye" id="eyeIcon"></i>
                    </button>
                </div>

                <button type="submit" class="btn">
                    <i class="fa-solid fa-arrow-left"></i> ورود
                </button>

                <p class="link">
                    <a href="{% url 'login' %}">ورود به سایت کاربران</a>
                </p>
            </form>
        </div>
    </div>

    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('passwordInput');
            const eyeIcon = document.getElementById('eyeIcon');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.className = 'fa-regular fa-eye-slash';
            } else {
                passwordInput.type = 'password';
                eyeIcon.className = 'fa-regular fa-eye';
            }
        }
    </script>

</body>

</html>
