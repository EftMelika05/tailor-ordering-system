{% load static %}
<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پنل خیاط | ثبت محصول آماده | دوزینو</title>

    <link rel="shortcut icon" href="{% static 'imag/Dozino_Logo_Transparent.png' %}" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/registering-products.css' %}">

    <style>
        /* ===== استایل‌های اضافی ===== */
        
        /* Custom Color Section */
        .custom-color-section {
            background: #f8f7fc;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
        }

        .custom-color-row {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .custom-color-row input[type="color"] {
            width: 50px;
            height: 50px;
            border: 2px solid #ddd;
            border-radius: 8px;
            padding: 2px;
            cursor: pointer;
        }

        .custom-color-row input[type="text"] {
            flex: 1;
            min-width: 120px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
        }

        .btn-add-color {
            background: #c9a86a;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .btn-add-color:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(201, 168, 106, 0.4);
        }
        .main-image {
    border: 3px solid #c9a86a;
    position: relative;
}

.main-image::after {
    content: "عکس اصلی";
    position: absolute;
    top: 8px;
    right: 8px;
    background: #c9a86a;
    color: white;
    padding: 3px 8px;
    border-radius: 8px;
    font-size: 12px;
}

.set-main-btn{
    position:absolute;
    bottom:8px;
    right:8px;
    border:none;
    background:#fff;
    padding:5px 10px;
    border-radius:8px;
    cursor:pointer;
}


        /* ===== Toast ===== */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1a1a2e;
            color: #fff;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 15px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
            opacity: 0;
            transition: all 0.4s ease;
            z-index: 999;
            pointer-events: none;
            font-family: inherit;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
            pointer-events: auto;
        }

        /* ===== رنگ‌های انتخابی ===== */
        .color-option {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid #ddd;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .color-option:hover {
            transform: scale(1.1);
            border-color: #999;
        }

        .color-option.selected {
            border-color: #c9a86a;
            box-shadow: 0 0 0 3px rgba(201, 168, 106, 0.3);
            transform: scale(1.1);
        }

        .colors-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, 40px);
            gap: 10px;
            justify-content: flex-start;
        }

        /* ===== موجودی رنگ ===== */
        .color-inventory-block {
            background: #f8f7fc;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .color-inv-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .color-dot {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: inline-block;
            border: 1px solid #ddd;
        }

        .color-name {
            font-weight: bold;
            flex: 1;
            font-size: 14px;
        }

        .remove-color {
            color: #e74c3c;
            cursor: pointer;
            font-size: 18px;
        }

        .remove-color:hover {
            transform: scale(1.2);
        }

        .color-inv-sizes {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .inv-size-row {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .inv-size-label {
            font-weight: bold;
            font-size: 13px;
            min-width: 30px;
        }

        .inv-qty-input {
            width: 50px;
            padding: 4px 6px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 13px;
        }

        /* ===== سایز و قیمت ===== */
        .size-price-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 10px;
        }

        .size-price-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .size-price-item label {
            font-size: 13px;
            font-weight: bold;
        }

        .size-price-input {
            padding: 6px 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 13px;
            width: 100%;
        }

        .size-price-item span {
            font-size: 12px;
            color: #888;
        }

        /* ===== دکمه‌های دسته‌بندی ===== */
        .category-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .category-btn {
            padding: 8px 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            background: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            font-size: 14px;
        }

        .category-btn:hover {
            border-color: #c9a86a;
            background: #f8f7fc;
        }

        .category-btn.active {
            border-color: #c9a86a;
            background: #c9a86a;
            color: white;
        }

        /* ===== Responsive ===== */
        @media(max-width: 768px) {
            .form-layout {
                flex-direction: column;
            }
            
            .custom-color-row {
                flex-direction: column;
                align-items: stretch;
            }
            
            .colors-grid {
                grid-template-columns: repeat(auto-fill, 35px);
            }
        }
    </style>
</head>

<body>

    <!-- ===== HEADER ===== -->
    <header class="topbar">
        <nav>
            <ul>
                <li><a href="{% url 'tailor_panel:dashboard' %}">خانه</a></li>
                <li><a href="{% url 'tailor_panel:manage_custom_products' %}">محصولات سفارشی</a></li>
                <li><a href="{% url 'tailor_panel:register_product' %}">محصولات آماده</a></li>
                <li><a href="{% url 'tailor_panel:dashboard' %}#orders">سفارشات</a></li>
            </ul>
        </nav>
        <div class="logo">DOZINO</div>
        <div class="header-icons">
            <a href="{% url 'tailor_panel:tailor_logout' %}">
                <i class="fa-solid fa-arrow-right-from-bracket" title="خروج"></i>
            </a>
        </div>
    </header>

    <!-- ===== MAIN CONTENT ===== -->
    <div class="container">
        <h1 class="page-title"><i class="fas fa-tshirt"></i> ثبت محصول آماده</h1>
        <div class="page-divider"></div>

        <div class="form-layout">
            <!-- ستون راست: آپلود عکس -->
            <div class="gallery-section">
                <h3><i class="fas fa-images"></i> تصاویر محصول</h3>
                <div class="upload-area">
                    <div class="image-grid" id="imageGrid"></div>
                    <div class="add-image-btn" onclick="addImageInput()">
                        <span>+</span>
                        <p>افزودن عکس جدید</p>
                    </div>
                </div>
            </div>

            <!-- ستون وسط: اطلاعات پایه -->
            <div class="product-info-section">
                <h3><i class="fas fa-info-circle"></i> اطلاعات پایه</h3>

                <div class="form-group">
                    <label><i class="fas fa-tag"></i> نام محصول *</label>
                    <input type="text" id="productName" placeholder="مثال: تیشرت طرح دار">
                </div>

                <div class="form-group">
                    <label><i class="fas fa-layer-group"></i> دسته‌بندی *</label>
                    <div class="category-buttons">
                        <button type="button" class="category-btn" onclick="selectCategory(this, 'زنانه')">
                            <i class="fa-solid fa-person-dress"></i> زنانه
                        </button>
                        <button type="button" class="category-btn" onclick="selectCategory(this, 'مردانه')">
                            <i class="fas fa-shirt"></i> مردانه
                        </button>
                        <button type="button" class="category-btn" onclick="selectCategory(this, 'بچگانه')">
                            <i class="fas fa-baby"></i> بچه گانه
                        </button>
                    </div>
                    <input type="hidden" id="category">
                </div>

                <div class="form-group tech-specs">
                    <label><i class="fas fa-tshirt"></i> مشخصات فنی</label>
                    <input type="text" id="fabricType" placeholder="جنس پارچه (مثال: تریکو)">
                    <input type="text" id="collarType" placeholder="مدل یقه" style="margin-top: 8px;">
                    <input type="text" id="sleeveType" placeholder="نوع آستین" style="margin-top: 8px;">
                    <input type="text" id="fabricThickness" placeholder="ضخامت پارچه" style="margin-top: 8px;">
                </div>

                <!-- ===== قیمت هر سایز ===== -->
                <div class="form-group">
                    <label>
                     <i class="fas fa-percent"></i>تخفیف محصول             
                    </label>
                    <input  type="number" id="discountPercent" 
                    placeholder="مثلا 5" min="0" max="100" >
                </div>
                <div class="price-section-inline">
                    <h3 style="margin-bottom: 12px;"><i class="fas fa-money-bill-wave"></i> قیمت هر سایز</h3>
                    <div class="form-group">
                        <label>
                         <i class="fas fa-money-bill"></i>
                         قیمت پایه محصول
                        </label>

                        <input type="number" id="basePrice" 
                        class="size-price-input" placeholder="مثلاً 850000">
                    </div>
                    <hr style="margin:15px 0;">
                    <div class="size-price-grid" id="sizePriceGrid">
                        <!-- سایزها با قیمت توسط JS ساخته میشن -->
                    </div>
                </div>
            </div>

            <!-- ستون چپ: رنگ و موجودی -->
            <div class="variant-section">
                <h3><i class="fas fa-palette"></i> رنگ‌ها و موجودی</h3>

                <!-- ===== انتخاب رنگ با پالت ===== -->
                <div class="custom-color-section">
                    <h4 style="margin: 0 0 10px 0; font-size: 14px; color: #555;">
                        <i class="fas fa-plus-circle"></i> افزودن رنگ دلخواه
                    </h4>
                    <div class="custom-color-row">
                        <input type="color" id="customColorPicker" value="#e74c3c">
                        <input type="text" id="customColorName" placeholder="نام رنگ (مثال: قرمز)">
                        <button onclick="addCustomColor()" class="btn-add-color">
                            <i class="fas fa-plus"></i> افزودن
                        </button>
                    </div>
                </div>

                <!-- ===== رنگ‌های از پیش تعیین شده ===== -->
                <div style="margin-top: 15px;">
                    <h4 style="margin: 10px 0; font-size: 14px; color: #555;">
                        <i class="fas fa-palette"></i> رنگ‌های پیش‌فرض
                    </h4>
                    <div class="colors-grid" id="defaultColors">
                        <!-- رنگ‌های پیش‌فرض توسط JS ساخته میشن -->
                    </div>
                </div>

                <div id="colorInventoryContainer" style="margin-top: 15px;">
                    <!-- رنگ‌های انتخاب شده با موجودی سایزها اینجا اضافه میشن -->
                </div>
            </div>
        </div>

        <!-- توضیحات -->
        <div class="description-section">
            <label><i class="fas fa-align-right"></i> توضیحات محصول</label>
            <textarea id="description" placeholder="توضیحات کامل محصول، راهنمای سایزبندی، نحوه شستشو، جنس و ..."></textarea>
        </div>

        <div class="form-actions">
            <button class="btn-delete" onclick="clearForm()"><i class="fas fa-trash-alt"></i> پاک کردن فرم</button>
            <button class="btn-submit" onclick="submitProduct()"><i class="fas fa-save"></i> ثبت محصول آماده</button>
        </div>
    </div>

    <!-- ===== TOAST ===== -->
    <div class="toast" id="toast"></div>

    <script>
        // ============================================================
        // ===== VARIABLES =====
        // ============================================================
        let selectedColors = [];
        let imageFiles = [];
        const fixedSizes = ["S", "M", "L", "XL", "XXL"];
        let sizePrices = {};
        let colorInventory = {};

        // ============================================================
        // ===== TOAST =====
        // ============================================================
        let toastTimeout = null;

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // ============================================================
        // ===== IMAGES WITH MAIN IMAGE SELECTION =====
        // ============================================================

        function addImageInput() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.multiple = true;
            input.style.display = 'none';
            input.onchange = function(e) {
                const files = e.target.files;
                for (let file of files) {
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        const imageId = Date.now() + Math.random();
                        imageFiles.push({
                            id: imageId,
                            file: file,
                            data: event.target.result,
                            isMain: imageFiles.length === 0
                        });
                        renderImages();
                    };
                    reader.readAsDataURL(file);
                }
            };
            input.click();
        }

        function renderImages() {
            const grid = document.getElementById('imageGrid');
            grid.innerHTML = '';

            imageFiles.forEach((img) => {
                const div = document.createElement('div');
                div.className = 'image-item' + (img.isMain ? ' main-image' : '');
                div.innerHTML = `
                        <img src="${img.data}" alt="تصویر محصول">
                        <button class="delete-image" onclick="deleteImage(${img.id})">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                        ${!img.isMain ? `
                            <button class="set-main-btn" onclick="setMainImage(${img.id})">
                                <i class="fas fa-star"></i> اصلی
                            </button>
                        ` : ''}
                    `;
                grid.appendChild(div);
            });
        }

        function setMainImage(id) {
            imageFiles.forEach(img => {
                img.isMain = (img.id === id);
            });
            renderImages();
            showToast('✅ عکس اصلی انتخاب شد');
        }

        function deleteImage(id) {
            const img = imageFiles.find(i => i.id === id);
            if (img && img.isMain && imageFiles.length > 1) {
                const remaining = imageFiles.filter(i => i.id !== id);
                if (remaining.length > 0) {
                    remaining[0].isMain = true;
                }
            }
            imageFiles = imageFiles.filter(img => img.id !== id);
            renderImages();
        }

        // ============================================================
        // ===== CATEGORY =====
        // ============================================================
        function selectCategory(btn, categoryName) {
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('category').value = categoryName;
        }

        // ============================================================
        // ===== SIZE PRICES =====
        // ============================================================
        function renderSizePrices() {
            const container = document.getElementById('sizePriceGrid');
            container.innerHTML = '';

            fixedSizes.forEach(size => {
                const div = document.createElement('div');
                div.className = 'size-price-item';
                div.innerHTML = `
                        <label>سایز ${size}</label>
                        <input type="number" class="size-price-input" 
                               value="${sizePrices[size] || 0}" 
                               min="0" 
                               step="1000"
                               data-size="${size}"
                               oninput="updateSizePrice(this)">
                        <span>تومان</span>
                    `;
                container.appendChild(div);
            });
        }

        function updateSizePrice(input) {
            const size = input.dataset.size;
            const value = parseInt(input.value) || 0;
            sizePrices[size] = Math.max(0, value);
        }

        // ============================================================
        // ===== COLORS WITH CUSTOM COLOR PICKER =====
        // ============================================================

        // رنگ‌های پیش‌فرض
        const defaultColors = [
            { name: 'مشکی', code: '#1e1e2f' },
            { name: 'سفید', code: '#ffffff' },
            { name: 'گلبهی', code: '#ac8888' },
            { name: 'آبی', code: '#a9c4df' },
            { name: 'سبز', code: '#abd4bd' },
            { name: 'طلایی', code: '#d4af37' },
            { name: 'شرابی', code: '#8B0000' },
            { name: 'طوسی', code: '#2c3e50' },
            { name: 'کرم', code: '#f5f5dc' },
            { name: 'ارغوانی', code: '#5a012e' },
            { name: 'صورتی', code: '#d81b83' }
        ];

        function renderDefaultColors() {
            const container = document.getElementById('defaultColors');
            container.innerHTML = '';

            defaultColors.forEach(color => {
                const div = document.createElement('div');
                div.className = 'color-option';
                div.style.background = color.code;
                div.setAttribute('data-color', color.name);
                div.setAttribute('data-code', color.code);
                div.onclick = function() { toggleColor(this); };
                container.appendChild(div);
            });
        }

        function addCustomColor() {
            const picker = document.getElementById('customColorPicker');
            const nameInput = document.getElementById('customColorName');
            const colorName = nameInput.value.trim() || 'رنگ دلخواه';
            const colorCode = picker.value;

            const exists = defaultColors.some(c => c.name === colorName || c.code === colorCode);
            if (exists) {
                showToast('⚠️ این رنگ قبلاً وجود دارد');
                return;
            }

            defaultColors.push({ name: colorName, code: colorCode });

            const container = document.getElementById('defaultColors');
            const div = document.createElement('div');
            div.className = 'color-option';
            div.style.background = colorCode;
            div.setAttribute('data-color', colorName);
            div.setAttribute('data-code', colorCode);
            div.onclick = function() { toggleColor(this); };
            container.appendChild(div);

            nameInput.value = '';
            showToast('✅ رنگ "' + colorName + '" با موفقیت اضافه شد');
        }

        function toggleColor(element) {
            const colorName = element.getAttribute('data-color');
            const index = selectedColors.indexOf(colorName);

            if (index !== -1) {
                selectedColors.splice(index, 1);
                element.classList.remove('selected');
                delete colorInventory[colorName];
            } else {
                selectedColors.push(colorName);
                element.classList.add('selected');
                colorInventory[colorName] = {};
                fixedSizes.forEach(size => {
                    colorInventory[colorName][size] = 0;
                });
            }

            renderColorInventory();
        }

        function renderColorInventory() {
            const container = document.getElementById('colorInventoryContainer');
            container.innerHTML = '';

            if (selectedColors.length === 0) {
                container.innerHTML =
                    `<div style="color:#aaa; text-align:center; padding:20px; font-size:14px;">
                        <i class="fas fa-hand-pointer"></i> روی رنگ‌ها کلیک کنید تا موجودی وارد کنید
                    </div>`;
                return;
            }

            selectedColors.forEach(colorName => {
                const block = document.createElement('div');
                block.className = 'color-inventory-block';

                let sizesHTML = '';
                fixedSizes.forEach(size => {
                    const qty = colorInventory[colorName]?.[size] || 0;
                    sizesHTML += `
                            <div class="inv-size-row">
                                <span class="inv-size-label">${size}</span>
                                <input type="number" class="inv-qty-input" 
                                       value="${qty}" 
                                       min="0" 
                                       step="1"
                                       data-color="${colorName}"
                                       data-size="${size}"
                                       oninput="updateInventory(this)">
                            </div>
                        `;
                });

                const colorCode = getColorCode(colorName);
                block.innerHTML = `
                        <div class="color-inv-header">
                            <span class="color-dot" style="background:${colorCode}; border:1px solid #ccc;"></span>
                            <span class="color-name">${colorName}</span>
                            <span class="remove-color" onclick="removeColor('${colorName}')">
                                <i class="fas fa-times-circle"></i>
                            </span>
                        </div>
                        <div class="color-inv-sizes">
                            ${sizesHTML}
                        </div>
                    `;

                container.appendChild(block);
            });
        }

        function getColorCode(colorName) {
            const found = defaultColors.find(c => c.name === colorName);
            if (found) return found.code;
            return '#cccccc';
        }

        function updateInventory(input) {
            const color = input.dataset.color;
            const size = input.dataset.size;
            const value = parseInt(input.value) || 0;

            if (!colorInventory[color]) {
                colorInventory[color] = {};
            }
            colorInventory[color][size] = Math.max(0, value);
        }

        function removeColor(colorName) {
            selectedColors = selectedColors.filter(c => c !== colorName);
            delete colorInventory[colorName];
            document.querySelectorAll('.color-option').forEach(opt => {
                if (opt.getAttribute('data-color') === colorName) {
                    opt.classList.remove('selected');
                }
            });
            renderColorInventory();
        }

        // ============================================================
        // ===== SUBMIT =====
        // ============================================================
        const discountPercent = 
        document.getElementById('discountPercent').value || 0;
        function submitProduct() {
            const productName = document.getElementById('productName').value.trim();
            const category = document.getElementById('category').value;
            const description = document.getElementById('description').value.trim();

            const fabricType = document.getElementById('fabricType').value.trim();
            const collarType = document.getElementById('collarType').value.trim();
            const sleeveType = document.getElementById('sleeveType').value.trim();
            const fabricThickness = document.getElementById('fabricThickness').value.trim();

            // ===== اعتبارسنجی =====
            if (!productName) {
                showToast('لطفاً نام محصول را وارد کنید');
                return;
            }
            const basePrice =
              parseInt(document.getElementById("basePrice").value);
            if (!basePrice || basePrice <= 0){
              showToast("قیمت پایه محصول را وارد کنید");
              return;
            }
            if (!category) {
                showToast('لطفاً دسته‌بندی را انتخاب کنید');
                return;
            }
            if (selectedColors.length === 0) {
                showToast('حداقل یک رنگ برای محصول انتخاب کنید');
                return;
            }

            let hasPrice = false;
            for (const size in sizePrices) {
                if (sizePrices[size] > 0) hasPrice = true;
            }
            if (!hasPrice) {
                showToast('حداقل یک سایز با قیمت بیشتر از صفر وارد کنید');
                return;
            }

            let hasStock = false;
            for (const color in colorInventory) {
                for (const size in colorInventory[color]) {
                    if (colorInventory[color][size] > 0) hasStock = true;
                }
            }
            if (!hasStock) {
                showToast('حداقل یک رنگ با موجودی بیشتر از صفر وارد کنید');
                return;
            }

            if (imageFiles.length === 0) {
                showToast('حداقل یک تصویر برای محصول انتخاب کنید');
                return;
            }

            // ===== ساخت دیتا =====
            const genderMap = {
                'زنانه': 'female',
                'مردانه': 'male',
                'بچگانه': 'kids'
            };

            const productData = {
                product_name: productName,
                base_price: parseInt(document.getElementById("basePrice").value) || 0,
                discount_percent: discountPercent,
                gender: genderMap[category],
                description: description || 'بدون توضیحات',
                specifications: {
                    'جنس پارچه': fabricType,
                    'مدل یقه': collarType,
                    'نوع آستین': sleeveType,
                    'ضخامت پارچه': fabricThickness,
                },
                size_prices: sizePrices,
                colors: selectedColors.map(color => ({
                    name: color,
                    code: getColorCode(color),
                    inventory: colorInventory[color] || {}
                })),
                images: imageFiles.map(img => img.data),
                main_image_index: imageFiles.findIndex(img => img.isMain) || 0
            };

            // ===== ارسال به سرور =====
            fetch('/tailor-panel/products/register/submit/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCsrfToken()
                    },
                    body: JSON.stringify(productData)
                })
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        showToast('✅ محصول با موفقیت ثبت شد!');
                        setTimeout(() => clearForm(), 500);
                    } else {
                        showToast('❌ خطا: ' + data.message);
                    }
                })
                .catch(error => {
                    console.error("❌ خطا:", error);
                    showToast('❌ خطا در ارتباط با سرور');
                });
        }

        function getCsrfToken() {
            const cookieValue = document.cookie.match(/csrftoken=([^;]+)/);
            return cookieValue ? cookieValue[1] : '';
        }

        // ============================================================
        // ===== CLEAR FORM =====
        // ============================================================
        function clearForm() {
            if (confirm('آیا از پاک کردن فرم مطمئن هستید؟')) {
                document.getElementById('productName').value = '';
                document.getElementById('basePrice').value='';
                document.getElementById('category').value = '';
                document.getElementById('description').value = '';
                document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));

                selectedColors = [];
                colorInventory = {};
                sizePrices = {};
                document.querySelectorAll('.color-option').forEach(c => c.classList.remove('selected'));

                renderColorInventory();
                renderSizePrices();
                imageFiles = [];
                renderImages();
                showToast('فرم پاک شد');
            }
        }

        // ============================================================
        // ===== INIT =====
        // ============================================================
        renderSizePrices();
        renderColorInventory();
        renderDefaultColors();
    </script>

</body>

</html>
