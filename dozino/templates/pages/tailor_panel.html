{% load static %}
<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پنل خیاط | مدیریت سفارشات</title>
    <!-- Font Awesome 6 (Free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/tailor-panel.css' %}">
</head>

<body>

    <!-- ===== HEADER ===== -->
    <header class="topbar">

        <nav>
            <ul>
                <li><a href="#">خانه</a></li>
                <li><a href="#">محصولات سفارشی</a></li>
                <li><a href="Registering products.html">محصولات آماده</a></li>
                <li><a href="#orders">سفارشات</a></li>
            </ul>
        </nav>

        <div class="logo">DOZINO</div>

        <div class="header-icons">
            <a href="login.html"><i class="fa-solid fa-arrow-right-from-bracket" title="خروج"></i></a>
        </div>

    </header>

    <!-- ===== MAIN CONTENT ===== -->
    <div class="container">

        <!-- Panel Header -->
        <div class="panel-header">
            <h1><i class="fa-solid fa-scissors"></i> پنل خیاط</h1>
            <div class="badge">
                <i class="fa-regular fa-clock"></i> امروز: ۱۴۰۵/۰۴/۰۵
            </div>
        </div>

        <!-- Search Box -->
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="جستجوی سفارش با کد ۷ رقمی..." maxlength="7">
            <button onclick="searchOrder()">
                <i class="fa-solid fa-magnifying-glass"></i> جستجو
            </button>
        </div>

        <!-- ===== SECTION 1: سفارشات جدید ===== -->
        <div class="order-section" id="orders">
            <div class="section-header">
                <div class="left">
                    <i class="fa-regular fa-message"></i>
                    <h2>سفارشات جدید</h2>
                    <span class="count-badge" id="newCount">۰</span>
                </div>
            </div>
            <div class="scroll-horizontal" id="newOrdersContainer"></div>
        </div>

        <!-- ===== SECTION 2: درحال آماده‌سازی ===== -->
        <div class="order-section">
            <div class="section-header">
                <div class="left">
                    <i class="fa-regular fa-hourglass-half"></i>
                    <h2>درحال آماده‌سازی</h2>
                    <span class="count-badge" id="prepCount">۰</span>
                </div>
            </div>
            <div class="scroll-horizontal" id="prepOrdersContainer"></div>
        </div>

        <!-- ===== SECTION 3: ارسال شده ===== -->
        <div class="order-section">
            <div class="section-header">
                <div class="left">
                    <i class="fa-regular fa-paper-plane"></i>
                    <h2>ارسال شده</h2>
                    <span class="count-badge" id="sentCount">۰</span>
                </div>
            </div>
            <div class="scroll-horizontal" id="sentOrdersContainer"></div>
        </div>

        <!-- ===== BOTTOM ACTION CARDS ===== -->
        <div class="action-grid">

            <!-- کارت تغییر محصولات سفارشی -->
            <div class="action-card">
                <div class="card-image">
                    <img src="imag/home/تیشرت و تاپودورس.png" alt="محصولات سفارشی">
                </div>
                <div class="card-content">
                    <div class="info">
                        <h3><i class="fa-regular fa-pen-to-square" style="color:#c9a86a; margin-left:8px;"></i> محصولات
                            سفارشی</h3>
                        <p>ویرایش و مدیریت آیتم‌های قابل سفارش‌دهی</p>
                    </div>
                    <button class="action-btn">
                        <i class="fa-regular fa-pen-to-square"></i> تغییر محصولات
                    </button>
                </div>
            </div>

            <!-- کارت افزودن محصول آماده -->
            <div class="action-card">
                <div class="card-image">
                    <img src="imag/home/4.png" alt="افزودن محصول">
                </div>
                <div class="card-content">
                    <div class="info">
                        <h3><i class="fa-regular fa-square-plus" style="color:#c9a86a; margin-left:8px;"></i> محصول
                            آماده</h3>
                        <p>افزودن یک محصول جدید به فروشگاه</p>
                    </div>
                    <button class="action-btn">
                        <i class="fa-regular fa-square-plus"></i> افزودن محصول
                    </button>
                </div>
            </div>

        </div>

    </div>

    <!-- ===== TOAST ===== -->
    <div class="toast" id="toast"></div>

    <script>
        // DATA

        const orders = [
            { id: '1024567', date: '۱۴۰۵/۰۴/۰۴', status: 'new' },
            { id: '1024568', date: '۱۴۰۵/۰۴/۰۳', status: 'new' },
            { id: '1024569', date: '۱۴۰۵/۰۴/۰۲', status: 'new' },
            { id: '1024570', date: '۱۴۰۵/۰۴/۰۱', status: 'prep' },
            { id: '1024571', date: '۱۴۰۵/۰۳/۳۰', status: 'prep' },
            { id: '1024572', date: '۱۴۰۵/۰۳/۲۸', status: 'sent' },
            { id: '1024573', date: '۱۴۰۵/۰۳/۲۷', status: 'new' },
            { id: '1024574', date: '۱۴۰۵/۰۳/۲۵', status: 'prep' },
            { id: '1024575', date: '۱۴۰۵/۰۳/۲۴', status: 'new' },
            { id: '1024576', date: '۱۴۰۵/۰۳/۲۳', status: 'new' },
            { id: '1024577', date: '۱۴۰۵/۰۳/۲۲', status: 'prep' },
            { id: '1024578', date: '۱۴۰۵/۰۳/۲۱', status: 'sent' },
        ];

        // RENDER

        function renderOrders(filterText = '') {
            const newContainer = document.getElementById('newOrdersContainer');
            const prepContainer = document.getElementById('prepOrdersContainer');
            const sentContainer = document.getElementById('sentOrdersContainer');

            let filtered = orders;
            if (filterText.trim()) {
                filtered = orders.filter(o => o.id.includes(filterText.trim()));
            }

            const newOrders = filtered.filter(o => o.status === 'new');
            const prepOrders = filtered.filter(o => o.status === 'prep');
            const sentOrders = filtered.filter(o => o.status === 'sent');

            document.getElementById('newCount').textContent = newOrders.length;
            document.getElementById('prepCount').textContent = prepOrders.length;
            document.getElementById('sentCount').textContent = sentOrders.length;

            newContainer.innerHTML = buildOrderCards(newOrders);
            prepContainer.innerHTML = buildOrderCards(prepOrders);
            sentContainer.innerHTML = buildOrderCards(sentOrders);
        }

        function buildOrderCards(orderArray) {
            if (!orderArray.length) {
                return `
                    <div class="empty-state">
                        <i class="fa-regular fa-circle-check"></i>
                        <span>هیچ سفارشی در این دسته نیست</span>
                    </div>
                `;
            }

            let html = '';
            orderArray.forEach(order => {
                let statusLabel = '';
                let statusClass = '';

                if (order.status === 'new') {
                    statusLabel = 'جدید';
                    statusClass = 'status-new';
                } else if (order.status === 'prep') {
                    statusLabel = 'درحال آماده‌سازی';
                    statusClass = 'status-prep';
                } else if (order.status === 'sent') {
                    statusLabel = 'ارسال شده';
                    statusClass = 'status-sent';
                }

                html += `
                    <div class="order-card">
                        <span class="code">${order.id}</span>
                        <span class="order-date"><i class="fa-regular fa-calendar"></i> ${order.date}</span>
                        <span class="status-badge ${statusClass}">${statusLabel}</span>
                        <button class="view-btn" onclick="viewOrderDetails('${order.id}')">
                            <i class="fa-regular fa-eye"></i> مشاهده جزئیات
                        </button>
                    </div>
                `;
            });
            return html;
        }

        // SEARCH

        function searchOrder() {
            const input = document.getElementById('searchInput');
            const value = input.value.trim();
            renderOrders(value);
            if (value) {
                showToast(`جستجوی کد ${value} انجام شد`);
            } else {
                showToast('نمایش همه سفارشات');
            }
        }

        document.getElementById('searchInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                searchOrder();
            }
        });

        // TOAST

        let toastTimeout = null;

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // INIT

        document.addEventListener('DOMContentLoaded', () => {
            renderOrders();
        });
    </script>

</body>

</html>
