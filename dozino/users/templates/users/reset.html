{% load static %}
<!doctype html>
<html lang="fa" dir="ltr">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>reset password</title>

    <link rel="shortcut icon" href="Assets/images/All/logo.png" type="image/x-icon">
    <link rel="stylesheet" href="fonts/web/font-face.css">
    <link rel="stylesheet" href="assets/FontAwesome.Pro.7.2.0/css/all.css">

    <style>
        * {
            box-sizing: border-box;
        }

        @font-face {
            font-family: 'Gandom';
            src: url('assets/font/gandom-font-v0.5.1/Gandom.eot');
            src: url('assets/font/gandom-font-v0.5.1/Gandom.eot?#iefix') format('embedded-opentype'),
                url('assets/font/gandom-font-v0.5.1/Gandom.woff') format('woff'),
                url('assets/font/gandom-font-v0.5.1/gandom.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        html,
        body {
            height: 100%;
            margin: 0;
        }

        body {
            font-family: Gandom, Calibri, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            font-size: 18;
            background: #f2f2f8;
            flex-direction: column;
            display: flex;
            align-items: center;
            padding: 0;
        }


        /* Top Bar */
        .topbar {
            width: 100%;
            height: 72px;
            background: #5A012E;
            display: flex;
            align-items: center;
            padding: 0 35px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            direction: rtl;
            text-align: right;
            border-radius: 0 0 35px 35px;
        }

        .home-link {
            width: 44px;
            height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.35);
            border: 1px solid rgba(0, 0, 0, 0.06);
            transition: background-color 0.2s ease, transform 0.2s ease;
        }

        .home-link:hover {
            background: rgba(255, 255, 255, 0.55);
            transform: translateY(-1px);
        }

        .home-icon {
            width: 24px;
            height: 24px;
            fill: #fff;
        }


        .logo {
            font-family: "Playfair Display", serif;
            font-style: italic;
            font-size: 34px;
            color: #fff;
            line-height: 1;
            margin-left: 0;
            margin-right: auto;
            direction: ltr;
        }

        .auth-card {
            display: grid;
            grid-template-columns: 1fr 1fr;
            width: min(1000px, 100%);
            background: #fff;
            border-radius: 22px;
            overflow: hidden;
            box-shadow: -2px 0 10px rgba(110, 1, 77, 0.608);

        }

        .left {
            padding: 56px;
            background: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-bottom: 40px;
            justify-content: flex-start;
        }

        .logo-mark {
            width: 42px;
            border-radius: 50%;
            position: relative;
        }

        .brand-name {
            font-weight: 700;
            font-size: 24px;
            color: #2b2b3c;
        }

        h2 {
            text-align: end;
            margin: 0 0 12px;
            font-size: 32px;
            color: #000;
        }

        p {
            text-align: end;
            margin-bottom: 35px;
            color: #5b5b6a;
            font-size: 18px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .field {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f7f6fb;
            border: 1px solid rgba(0, 0, 0, .06);
            border-radius: 16px;
            padding: 12px;
        }

        .field input {
            width: 100%;
            border: none;
            background: transparent;
            outline: none;
            font-size: 14px;
            color: #2b2b3c;
        }

        .field-icon {
            width: 26px;
            text-align: center;
            opacity: .7;
        }


        .btn {
            margin-top: 10px;
            background: linear-gradient(90deg, #d81b83 0%, #5a012e 100%);
            color: #fff;
            border: none;
            border-radius: 999px;
            padding: 13px 16px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 15px;
        }

        .btn:hover {
            filter: brightness(1.05);
            transform: translateY(-2px);
        }

        .right {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .right img {
            max-width: 100%;
            height: auto;
            border-radius: 16px;
        }

        @media(max-width: 800px) {
            .auth-card {
                grid-template-columns: 1fr;
            }

            .right {
                min-height: 200px;
                display: none;
            }
        }
    </style>
</head>

<body>

    <header class="topbar">

        <a class="home-link" href="file:///C:/Users/user/Desktop/123/index.html" aria-label="صفحه اصلی"
            title="صفحه اصلی">
            <!-- SVG Home Icon -->
            <svg class="home-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path
                    d="M12 3.2 3 10.4v10.4c0 .6.4 1 1 1h5.5v-7.2c0-.6.4-1 1-1h3c.6 0 1 .4 1 1V22H20c.6 0 1-.4 1-1V10.4l-9-7.2z" />
            </svg>
        </a>
        <div class="logo">Dozino</div>
    </header>
    <br>
    <div class="auth-card">
        <div class="left">
            <header class="brand">
                <img src="assets/imgs/logo.jpg" alt="logo" class="logo-mark">
                <div class="brand-name">Dozino</div>
            </header>
            <h2>رمزتو فراموش کردی؟</h2>
            <p>ایمیل خود را وارد کنید تا لینک بازیابی پسورد برای شما ارسال شود</p>
            <form method="past" id="resetForm">
                {% csrf_token %}
                <div class="field">
                    <label class="field-icon" aria-hidden="true">✉️</label>
                    <input type="email" name="email" placeholder="Email Address" required />
                </div>
                <button type="submit" class="btn">ارسال لینک بازیابی</button>
            </form>
        </div>
        <div class="right">
            <img src="assets/imgs/sign up.jpg" alt="image" />
        </div>
    </div>

    <script>
        document.getElementById('resetForm').addEventListener('submit', function (e) {
            e.preventDefault();
            alert('لینک بازیابی رمز به ایمیل شما ارسال شد.');
            // اینجا می‌تونید درخواست به سرور ارسال کنید
        });
    </script>
    <br>
</body>

</html>
